  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #888899;
    --accent-air: #34aadc;
    --accent-pro: #ff6b35;
    --accent-neo: #30d158;
    --accent-max: #bf5af2;
    --gold: #ffd60a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    padding: 60px 24px 44px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(52,170,220,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(191,90,242,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .hero-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-air);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(26px, 5.5vw, 48px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--accent-air); }
  .hero p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .progress-wrap {
    max-width: 560px;
    margin: 0 auto 36px;
    padding: 0 24px;
  }
  .progress-bar-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-air), var(--accent-max));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    border-radius: 2px;
  }
  .progress-text {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 1px;
  }

  .quiz-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .q-number {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .q-text { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 6px; }
  .q-sub { font-size: 13px; color: var(--muted); font-weight: 300; margin-bottom: 28px; line-height: 1.6; }

  .options-grid { display: grid; gap: 10px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    width: 100%;
  }
  .option-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); transform: translateX(3px); }
  .option-btn.selected { border-color: var(--accent-air); background: rgba(52,170,220,0.08); }
  .opt-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .opt-label { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 3px; }
  .opt-desc { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.5; }

  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; }

  .btn-back {
    font-size: 13px; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: inherit; padding: 8px 0; transition: color 0.2s;
  }
  .btn-back:hover { color: var(--text); }

  .btn-next {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
    padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent-air), #5ac8fa);
    color: #000; transition: all 0.2s ease; opacity: 0.35; pointer-events: none;
  }
  .btn-next.active { opacity: 1; pointer-events: auto; }
  .btn-next.active:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(52,170,220,0.4); }

  .result-wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px 80px;
    animation: fadeUp 0.5s ease both;

  .result-headline { text-align: center; margin-bottom: 32px; }

    display: inline-block;

    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;

  .rec-card {
    border-radius: 24px; padding: 30px; margin-bottom: 16px;

  .rec-card.air  { background: linear-gradient(135deg, #0a1820, #081520); border: 1.5px solid rgba(52,170,220,0.3); }
  .rec-card.pro  { background: linear-gradient(135deg, #1a0f08, #180c05); border: 1.5px solid rgba(255,107,53,0.3); }
  .rec-card.neo  { background: linear-gradient(135deg, #081510, #061208); border: 1.5px solid rgba(48,209,88,0.3); }
  .rec-card.max  { background: linear-gradient(135deg, #130a1a, #100818); border: 1.5px solid rgba(191,90,242,0.3); }

  .rec-card::before {
    content: '★ RECOMMENDED';
    position: absolute; top: 18px; right: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px; letter-spacing: 2px; color: var(--gold); opacity: 0.8;
  }

  .rec-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .rec-title h3 { font-family: 'Space Grotesk', sans-serif; font-size: 21px; font-weight: 700; margin-bottom: 4px; }
  .rec-title p { font-size: 12px; color: var(--muted); }
  .rec-price { text-align: right; flex-shrink: 0; }
  .rec-price .from { font-size: 10px; color: var(--muted); }
  .rec-price .price { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .air .rec-price .price { color: var(--accent-air); }
  .pro .rec-price .price { color: var(--accent-pro); }
  .neo .rec-price .price { color: var(--accent-neo); }
  .max .rec-price .price { color: var(--accent-max); }

  .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .spec-item { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 12px; }
  .spec-item .sk { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 3px; }
  .spec-item .sv { font-size: 12px; font-weight: 500; }

  .reason-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }

  .air .dot { background: var(--accent-air); }
  .pro .dot { background: var(--accent-pro); }
  .neo .dot { background: var(--accent-neo); }
  .max .dot { background: var(--accent-max); }

    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; font-size: 12px;
    color: var(--muted); line-height: 1.7; margin-bottom: 12px;

  .price-note strong { color: var(--text); }

  .caution-box {
    background: rgba(255,214,10,0.05); border: 1px solid rgba(255,214,10,0.2);
    border-radius: 10px; padding: 10px 14px; font-size: 12px;
    color: rgba(255,214,10,0.75); line-height: 1.6;
  }
  .caution-box strong { color: var(--gold); }

  .others-title { font-family: 'Space Grotesk', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .others-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .other-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; transition: all 0.2s; }
  .other-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
  .other-name { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .other-sub { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .other-price { font-size: 15px; font-weight: 600; }

  .restart-btn {
    display: block; margin: 32px auto 0;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; padding: 11px 28px;
    background: none; border: 1.5px solid var(--border); border-radius: 50px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .restart-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

  .hidden { display: none !important; }

  .source-note {
    text-align: center; font-size: 10px; color: rgba(136,136,153,0.45);
    padding: 16px 20px 32px; line-height: 1.7; max-width: 640px; margin: 0 auto;

function scoreModels(a) {
  const s = {};
  Object.keys(MODELS).forEach(k => s[k] = 0);
  const {use, mobility, memory, display, battery, priority} = a;

  if (use==='basic')          { s.neo+=10; s.air13+=6; }
  if (use==='creative_light') { s.air13+=9; s.air15+=7; s.pro14_m5+=5; }
  if (use==='creative_heavy') { s.pro14_m5pro+=9; s.pro16_m5pro+=7; s.pro14_m5max+=11; s.pro16_m5max+=10; }
  if (use==='dev')            { s.pro14_m5pro+=9; s.pro14_m5+=6; s.air13+=5; }
  if (use==='ai')             { s.pro14_m5max+=15; s.pro16_m5max+=14; s.pro14_m5pro+=7; }

  if (mobility==='always')    { s.air13+=7; s.neo+=5; s.pro14_m5+=3; s.pro14_m5pro+=2; }
  if (mobility==='sometimes') { s.air13+=4; s.air15+=3; s.pro14_m5pro+=3; s.pro14_m5+=2; }
  if (mobility==='desk')      { s.air15+=3; s.pro16_m5pro+=5; s.pro16_m5max+=5; }

  if (memory==='light')  { s.neo+=6; s.air13+=4; }
  if (memory==='normal') { s.air13+=5; s.air15+=4; s.pro14_m5+=3; }
  if (memory==='heavy')  { s.pro14_m5pro+=8; s.pro14_m5max+=10; s.pro16_m5max+=9; }

  if (display==='none')  { s.neo+=3; s.air13+=3; }
  if (display==='dual')  { s.air13+=4; s.air15+=4; s.pro14_m5+=3; s.pro14_m5pro+=5; }
  if (display==='multi') { s.pro14_m5max+=9; s.pro16_m5max+=10; s.pro14_m5pro+=5; s.pro16_m5pro+=5; }

  if (battery==='high') { s.air13+=5; s.air15+=5; s.neo+=3; s.pro14_m5+=4; }
  if (battery==='low')  { s.pro16_m5max+=2; s.pro14_m5max+=2; }

  if (priority==='cost')     { s.neo+=8; s.air13+=6; }
  if (priority==='perf')     { s.pro14_m5max+=9; s.pro16_m5max+=8; s.pro14_m5pro+=7; }
  if (priority==='portable') { s.air13+=8; s.neo+=6; s.pro14_m5pro+=2; }
  if (priority==='longterm') { s.air13+=5; s.air15+=4; s.pro14_m5pro+=5; }

  // ペナルティ：Neoに重い用途
  if (use==='creative_heavy'||use==='ai'||use==='dev') s.neo -= 8;
  // AI追加ボースト
  if (use==='ai') s.pro14_m5max += 5;

  return Object.entries(s).sort((a,b)=>b[1]-a[1]);
}

let currentQ=0, answers={};

function el(tag,cls,text){const e=document.createElement(tag);e.className=cls;e.textContent=text;return e;}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const total = QUESTIONS.length;
  document.getElementById('progressFill').style.width = Math.round(idx/total*100)+'%';
  document.getElementById('progressText').textContent = `STEP ${idx} / ${total}`;

  const card = document.getElementById('qCard');
  card.style.animation='none'; void card.offsetHeight; card.style.animation='';
  card.innerHTML='';

  card.append(
    el('div','q-number',`質問 ${idx+1} / ${total}`),
    el('div','q-text', q.text),
    el('div','q-sub',  q.sub)
  );

  const grid = document.createElement('div');
  grid.className = 'options-grid';

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-next' + (answers[q.id] ? ' active' : '');
  nextBtn.textContent = idx===total-1 ? '診断結果を見る →' : '次へ →';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[q.id]===opt.value?' selected':'');
    btn.innerHTML = `<span class="opt-icon">${opt.icon}</span><span class="opt-body"><span class="opt-label">${opt.label}</span><span class="opt-desc">${opt.desc}</span></span>`;
    btn.addEventListener('click', () => {
      answers[q.id]=opt.value;
      grid.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      nextBtn.classList.add('active');
    });
    grid.appendChild(btn);
  });

  nextBtn.addEventListener('click', () => {
    if(!answers[q.id]) return;
    if(currentQ<total-1){currentQ++;renderQuestion(currentQ);}
    else showResult();
  });

  const backBtn = document.createElement('button');
  backBtn.className='btn-back';
  backBtn.textContent = idx>0 ? '← 前の質問' : '';
  backBtn.disabled = idx===0;
  backBtn.addEventListener('click',()=>{if(currentQ>0){currentQ--;renderQuestion(currentQ);}});

  const nav=document.createElement('div'); nav.className='q-nav';
  nav.append(backBtn, nextBtn);
  card.append(grid, nav);
}

function showResult() {
  const total=QUESTIONS.length;
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent=`STEP ${total} / ${total} — 診断完了`;
  const ranked=scoreModels(answers);
  const top=MODELS[ranked[0][0]];
  document.getElementById('quizSection').classList.add('hidden');
  const rs=document.getElementById('resultSection');
  rs.classList.remove('hidden');

  const cc=top.key.includes('max')?'max':top.color;
  const bl=top.key.includes('neo')?'MacBook Neo':top.key.includes('air')?'MacBook Air':top.key.includes('max')?'MacBook Pro Max':'MacBook Pro';

  rs.innerHTML=`
    <div class="result-headline">
      <div class="badge badge-${cc}">${bl}</div>
      <h2>${top.name}</h2>
      <p>${top.sub}</p>
    </div>
    ${buildRec(top)}
    <div class="others-section">
      <div class="others-title">その他の候補モデル</div>
      <div class="others-grid">${ranked.slice(1,4).map(([k])=>buildOther(MODELS[k])).join('')}</div>
    </div>
    <button class="restart-btn" onclick="restart()">もう一度診断する</button>`;
}

function buildRec(m){
  const cc=m.key.includes('max')?'max':m.color;
  const prosH=m.pros.slice(0,4).map(r=>`<div class="reason-item"><span class="dot"></span><span>${r}</span></div>`).join('');
  const priceH=`<div class="price-note"><strong>参考価格（税込・Apple直販）：${m.price}</strong><br>※最小構成価格。メモリ・ストレージ増量でカスタマイズ可能。学生・教職員向け割引あり。</div>`;
  const cautH=m.caution?`<div class="caution-box"><strong>📋 注記：</strong>${m.caution}</div>`:'';
  return `<div class="rec-card ${cc}">
    <div class="rec-header">
      <div class="rec-title"><h3>${m.name}</h3><p>${m.sub}</p></div>
      <div class="rec-price"><div class="from">税込・Apple直販 最小構成</div><div class="price">${m.price}</div></div>
    </div>
    <div class="spec-grid">
      <div class="spec-item"><div class="sk">CHIP</div><div class="sv">${m.chip}</div></div>
      <div class="spec-item"><div class="sk">CPU</div><div class="sv">${m.cpu}</div></div>
      <div class="spec-item"><div class="sk">GPU</div><div class="sv">${m.gpu}</div></div>
      <div class="spec-item"><div class="sk">MEMORY</div><div class="sv">${m.memory}</div></div>
      <div class="spec-item"><div class="sk">STORAGE</div><div class="sv">${m.storage}</div></div>
      <div class="spec-item"><div class="sk">BATTERY</div><div class="sv">${m.battery}</div></div>
      <div class="spec-item"><div class="sk">WEIGHT</div><div class="sv">${m.weight}</div></div>
      <div class="spec-item"><div class="sk">PORTS</div><div class="sv">${m.ports}</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px;">✅ おすすめポイント</div>
    <div class="reason-list ${cc}">${prosH}</div>
    ${priceH}${cautH}
  </div>`;
}

function buildOther(m){
  const cc=m.key.includes('max')?'max':m.color;
  return `<div class="other-card"><div class="other-name" style="color:var(--accent-${cc})">${m.name}</div><div class="other-sub">${m.sub}</div><div class="other-price" style="color:var(--accent-${cc})">${m.price}</div></div>`;
}

function restart(){answers={};currentQ=0;document.getElementById('resultSection').classList.add('hidden');document.getElementById('quizSection').classList.remove('hidden');renderQuestion(0);}

renderQuestion(0);
</script>
